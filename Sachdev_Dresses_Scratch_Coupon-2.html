<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachdev Dresses Scratch & Win</title>
<style>
body{font-family:Arial,sans-serif;text-align:center;background:#f5f5f5;padding:20px}
.card{max-width:420px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
canvas{border-radius:10px;border:1px solid #ccc;touch-action:none}
.prize{width:300px;height:120px;margin:auto;display:flex;align-items:center;justify-content:center;
font-size:28px;font-weight:bold;background:#fff3cd;border-radius:10px}
h2{margin-top:0}
</style>
</head>
<body>
<div class="card">
<h2>Sachdev Dresses</h2>
<p>Scratch & Win Coupon</p>
<div id="prize" class="prize">🎁 ₹100 OFF 🎁</div>
<canvas id="scratch" width="300" height="120"></canvas>
<p>Station Road, Umaria<br>9685856424 | 9713013136</p>
</div>

<script>
const canvas=document.getElementById('scratch');
const ctx=canvas.getContext('2d');
ctx.fillStyle='#B0B0B0';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='black';
ctx.font='20px Arial';
ctx.fillText('SCRATCH HERE',75,68);

let drawing=false;

function pos(e){
 const r=canvas.getBoundingClientRect();
 const t=e.touches?e.touches[0]:e;
 return {x:t.clientX-r.left,y:t.clientY-r.top};
}
function scratch(e){
 if(!drawing) return;
 e.preventDefault();
 const p=pos(e);
 ctx.globalCompositeOperation='destination-out';
 ctx.beginPath();
 ctx.arc(p.x,p.y,18,0,Math.PI*2);
 ctx.fill();
}
canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mousemove',scratch);
canvas.addEventListener('touchstart',()=>drawing=true);
canvas.addEventListener('touchend',()=>drawing=false);
canvas.addEventListener('touchmove',scratch);
</script>
</body>
</html>
