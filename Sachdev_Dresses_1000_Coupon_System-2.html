function loadCoupon(){
 let code=document.getElementById('code').value.trim().toUpperCase();
 let msg=document.getElementById('msg');

 if(!coupons[code]){
   msg.innerHTML="Invalid Coupon Code";
   return;
 }

 if(localStorage.getItem("used_"+code)){
   msg.innerHTML="This coupon has already been opened on this device.";
   return;
 }

 document.getElementById('card').style.display='block';
 document.getElementById('prize').innerHTML=coupons[code];

 const canvas=document.getElementById('scratch');
 const ctx=canvas.getContext('2d');
 ctx.globalCompositeOperation='source-over';
 ctx.fillStyle='#B0B0B0';
 ctx.fillRect(0,0,300,120);
 ctx.fillStyle='black';
 ctx.font='20px Arial';
 ctx.fillText('SCRATCH HERE',75,65);

 let drawing=false;

 function scratch(e){
   if(!drawing) return;
   e.preventDefault();
   const r=canvas.getBoundingClientRect();
   const t=e.touches?e.touches[0]:e;
   const x=t.clientX-r.left;
   const y=t.clientY-r.top;
   ctx.globalCompositeOperation='destination-out';
   ctx.beginPath();
   ctx.arc(x,y,18,0,Math.PI*2);
   ctx.fill();
 }

 canvas.onmousedown=()=>drawing=true;
 canvas.onmouseup=()=>{drawing=false; localStorage.setItem("used_"+code,"1");};
 canvas.onmousemove=scratch;
 canvas.ontouchstart=()=>drawing=true;
 canvas.ontouchend=()=>{drawing=false; localStorage.setItem("used_"+code,"1");};
 canvas.ontouchmove=scratch;
 msg.innerHTML="";
}
</script>
